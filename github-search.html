<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub検索</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>私のポートフォリオ</h1>
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="contact.html">お問い合わせ</a></li>
                <li><a href="work.html">課題</a></li>
                <li><a href="calculate.html">電卓</a></li>
                <li><a href="github-search.html">GitHub検索</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>GitHub検索</h2>
            <input type="text" id="searchInput" placeholder="GitHubユーザー名を入力">
            <button onclick="searchGitHub()">検索</button>
            <div id="result"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 私のポートフォリオ</p>
    </footer>

    <script>
        async function searchGitHub() {
            const username = document.getElementById('searchInput').value;
            const result = document.getElementById('result');

            if (username === '') {
                result.innerHTML = '<p>ユーザー名を入力してください</p>';
                return;
            }

            result.innerHTML = '<p>検索中...</p>';

            try {
                const response = await fetch(`https://api.github.com/users/${username}`);
                
                if (!response.ok) {
                    result.innerHTML = '<p>ユーザーが見つかりませんでした</p>';
                    return;
                }

                const data = await response.json();

                result.innerHTML = `
                    <h3>${data.name || data.login}</h3>
                    <img src="${data.avatar_url}" width="100">
                    <p>ユーザー名：${data.login}</p>
                    <p>リポジトリ数：${data.public_repos}</p>
                    <p>フォロワー数：${data.followers}</p>
                    <a href="${data.html_url}" target="_blank">GitHubプロフィールを見る</a>
                `;
            } catch (error) {
                result.innerHTML = '<p>エラーが発生しました</p>';
            }
        }
    </script>
</body>
</html>
