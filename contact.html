次は`contact.html`を開いて以下のコードを書いてください。

```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>私のポートフォリオ</h1>
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="contact.html">お問い合わせ</a></li>
                <li><a href="work.html">課題</a></li>
                <li><a href="calculate.html">電卓</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>お問い合わせ</h2>
            <p>ご連絡は以下のフォームからお願いします。</p>

            <label>お名前</label><br>
            <input type="text" placeholder="例：山田太郎"><br><br>

            <label>メールアドレス</label><br>
            <input type="email" placeholder="例：sample@email.com"><br><br>

            <label>メッセージ</label><br>
            <textarea rows="5" cols="40" placeholder="メッセージを入力してください"></textarea><br><br>

            <button type="submit">送信</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 私のポートフォリオ</p>
    </footer>
</body>
